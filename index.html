<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> SMARTPDF ASSISTANT</title>

<style>
/* Body with modern gradient background using blue accent */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    color: #f5f5f5;
    overflow: hidden; /* hide overflow for bubbles */
    background: linear-gradient(120deg, #1a1a1a, #2c3e50, #3498db, #d6c1a3); /* Blue accent */
    background-size: 400% 400%;
    animation: danceBG 25s ease infinite;
    position: relative;
}

/* Smooth gradient animation */
@keyframes danceBG {
    0% { background-position: 0% 50%; }
    25% { background-position: 50% 50%; }
    50% { background-position: 100% 50%; }
    75% { background-position: 50% 50%; }
    100% { background-position: 0% 50%; }
}

/* Floating bubbles container */
#bubbles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* allow clicks through bubbles */
    overflow: hidden;
    z-index: 0;
}

/* Bubble style */
.bubble {
    position: absolute;
    bottom: -50px;
    border-radius: 50%;
    opacity: 0.6;
    background: radial-gradient(circle at 30% 30%, rgba(52,152,219,0.7), rgba(214,193,163,0.2));
    animation: rise 15s linear infinite;
}

/* Bubble animation */
@keyframes rise {
    0% { transform: translateY(0) scale(0.5); opacity: 0.5; }
    50% { opacity: 0.7; }
    100% { transform: translateY(-120vh) scale(1); opacity: 0; }
}

/* Header */
header {
    text-align: center;
    padding: 25px;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 5px #d6c1a3, 0 0 15px #3498db;
    background: rgba(0,0,0,0.5);
    border-bottom: 4px solid #3498db;
    color: #f5f5f5;
    animation: glowDance 3s ease-in-out infinite alternate;
    z-index: 1;
    position: relative;
}

@keyframes glowDance {
    0% { text-shadow: 0 0 5px #d6c1a3, 0 0 15px #3498db; }
    50% { text-shadow: 0 0 15px #d6c1a3, 0 0 25px #3498db, 0 0 35px #1a1a1a; }
    100% { text-shadow: 0 0 5px #d6c1a3, 0 0 15px #3498db; }
}

/* Container layout */
.container {
    display: flex;
    max-width: 1200px;
    margin: auto;
    height: calc(100vh - 80px);
    position: relative;
    z-index: 1;
}

/* Sidebar */
.sidebar {
    width: 300px;
    background: rgba(26, 26, 26, 0.85);
    padding: 20px;
    border-right: 2px solid #3498db;
    backdrop-filter: blur(5px);
    z-index: 1;
}

.sidebar h3, .sidebar label {
    color: #d6c1a3;
}

/* Chat area */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(3px);
    z-index: 1;
}

.messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: rgba(44, 62, 80, 0.85);
    border-left: 2px solid #3498db;
    border-right: 2px solid #3498db;
}

/* Chat messages */
.message {
    margin-bottom: 15px;
    max-width: 80%;
    padding: 14px;
    border-radius: 16px;
    color: #f5f5f5;
    animation: messageDance 2s ease-in-out infinite alternate;
}

.user {
    background: linear-gradient(90deg, #d6c1a3, #3498db);
    align-self: flex-end;
}

.bot {
    background: linear-gradient(90deg, #1a1a1a, #2c3e50);
    align-self: flex-start;
}


/* Input area */
.input-area {
    display: flex;
    padding: 10px;
    background: rgba(26, 26, 26, 0.85);
    border-top: 2px solid #3498db;
}

input, button, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

input {
    flex: 1;
    background: rgba(44, 62, 80, 0.85);
    color: #f5f5f5;
}

button {
    margin-left: 10px;
    background: linear-gradient(90deg, #3498db, #d6c1a3, #2c3e50);
    color: #f5f5f5;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.3s;
}

button:hover {
    transform: scale(1.05) rotate(-1deg);
    box-shadow: 0 0 10px #3498db, 0 0 15px #d6c1a3, 0 0 20px #2c3e50;
}

select {
    background: rgba(44, 62, 80, 0.85);
    color: #f5f5f5;
}
</style>

    <!-- Add bubbles container -->
<div id="bubbles"></div>

<script>
// Generate floating bubbles dynamically
const bubbleContainer = document.getElementById('bubbles');
const colors = ['rgba(52,152,219,0.6)', 'rgba(214,193,163,0.5)', 'rgba(255, 255, 255, 0.4)'];

function createBubble() {
    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    const size = Math.random() * 30 + 20; // 20px - 50px
    bubble.style.width = size + 'px';
    bubble.style.height = size + 'px';
    bubble.style.left = Math.random() * 100 + 'vw';
    bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
    bubble.style.animationDuration = (Math.random() * 15 + 10) + 's';
    bubbleContainer.appendChild(bubble);

    // Remove bubble after animation
    setTimeout(() => {
        bubble.remove();
    }, 25000);
}

// Generate bubbles periodically
setInterval(createBubble, 500);
</script>

<!-- PDF.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
</head>

<body>

<header> SMARTPDF ASSISTANT</header>

<div class="container">

<div class="sidebar">
    <h3>Upload PDFs for Subjects</h3>
    <label>Software Engineering (SE):</label>
    <input type="file" id="pdfSE" accept="application/pdf">
    
    <label>Operating Systems (OS):</label>
    <input type="file" id="pdfOS" accept="application/pdf">
    
    <label>DBMS (DBMS):</label>
    <input type="file" id="pdfDBMS" accept="application/pdf">
    
    <button onclick="loadAllPDFs()">Load PDFs</button>
    
    <hr>
    <h3>Select Subject</h3>
    <select id="subjectSelect">
        <option value="">--Select Subject--</option>
        <option value="SE">Software Engineering</option>
        <option value="OS">Operating Systems</option>
        <option value="DBMS">DBMS</option>
    </select>
</div>

<div class="chat-area">
    <div id="messages" class="messages"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask any topic/question from selected PDF">
        <button onclick="sendMessage()">Ask</button>
    </div>
</div>

</div>

<script>
let pdfDocs = { SE: null, OS: null, DBMS: null };
let pdfTexts = { SE: [], OS: [], DBMS: [] };

const messages = document.getElementById("messages");

// Add message to chat
function addMessage(text, type) {
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
}

// Load a single PDF
async function loadPDF(fileInput, subjectKey) {
    return new Promise((resolve) => {
        const file = fileInput.files[0];
        if (!file) return resolve();

        const reader = new FileReader();
        reader.onload = async function () {
            const typedArray = new Uint8Array(this.result);
            const loadingTask = pdfjsLib.getDocument(typedArray);
            const pdfDoc = await loadingTask.promise;

            pdfDocs[subjectKey] = pdfDoc;
            pdfTexts[subjectKey] = [];

            const pagesPromises = [];

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                pagesPromises.push(
                    pdfDoc.getPage(i).then(page =>
                        page.getTextContent().then(content => {
                            pdfTexts[subjectKey][i - 1] =
                                content.items.map(item => item.str).join(" ");
                        })
                    )
                );
            }

            await Promise.all(pagesPromises);
            resolve();
        };

        reader.readAsArrayBuffer(file);
    });
}

// Load all PDFs
async function loadAllPDFs() {
    await loadPDF(document.getElementById("pdfSE"), "SE");
    await loadPDF(document.getElementById("pdfOS"), "OS");
    await loadPDF(document.getElementById("pdfDBMS"), "DBMS");

    alert("PDFs loaded successfully!");
}

    // Search PDF for question in selected subject
function getPDFAnswer(query, subjectKey) {
    if (!pdfDocs[subjectKey]) {
        return { found: false };
    }

    query = query.toLowerCase();
    const matches = [];

    pdfTexts[subjectKey].forEach((text, index) => {
        if (text && text.toLowerCase().includes(query)) {
            matches.push({ page: index + 1, snippet: text });
        }
    });

    if (matches.length > 0) {
        const firstMatch = matches[0];
        const snippet = firstMatch.snippet.substring(0, 300) + "...";

        return {
            found: true,
            page: firstMatch.page,
            text: snippet
        };
    }

    return {
        found: false
    };
}


// 2. 👉 PASTE YOUR askAI FUNCTION HERE
async function askAI(question, context) {
    try {
        const res = await fetch("https://pdf-ai-doubt-solver.onrender.com/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                question: question,
                context: context
            })
        });

        const data = await res.json();
        return data.answer;
    } catch (err) {
        return "AI backend error";
    }
}

// Send message from user
async function sendMessage() {
    const input = document.getElementById("userInput");
    const query = input.value.trim();
    const subjectKey = document.getElementById("subjectSelect").value;

    if (!query) return;
    if (!subjectKey) return alert("Please select a subject first.");

    if (!pdfTexts[subjectKey] || pdfTexts[subjectKey].length === 0) {
        alert("Please load the PDF first!");
        return;
    }


    addMessage(query, "user");
    input.value = "";

    // Step 1: search PDF
    const result = getPDFAnswer(query, subjectKey);

    // ✅ If found in PDF
    if (result.found) {
        addMessage(
            `📄 Page ${result.page}\n\n${result.text}`,
            "bot"
        );
    }

    // ❌ If NOT found → call AI
    else {
        addMessage("Searching AI...", "bot");

        const aiResponse = await askAI(query);

        // remove "Searching AI..."
        messages.lastChild.remove();

        addMessage("🤖 AI Answer:\n" + aiResponse, "bot");
    }
}

</script>

</body>
</html>
